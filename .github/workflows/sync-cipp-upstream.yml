name: Sync CIPP Fork with Upstream

on:
  schedule:
    # Run every day at 2 AM UTC
    - cron: '0 2 * * *'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-cipp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CIPP fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync CIPP upstream
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          git remote add upstream https://github.com/KelvinTegelaar/CIPP.git || git remote set-url upstream https://github.com/KelvinTegelaar/CIPP.git
          git fetch upstream main
          git merge upstream/main --no-edit
          git push origin master
