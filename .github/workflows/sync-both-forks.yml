name: Sync Both CIPP Forks with Upstream

on:
  schedule:
    # Run every day at 2 AM UTC
    - cron: '0 2 * * *'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  sync-cipp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CIPP fork
        uses: actions/checkout@v4
        with:
          repository: audian-benp/CIPP
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync CIPP upstream
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          
          git remote add upstream https://github.com/KelvinTegelaar/CIPP.git || git remote set-url upstream https://github.com/KelvinTegelaar/CIPP.git
          git fetch upstream master
          git merge upstream/master --no-edit
          git push origin master

  sync-cipp-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CIPP-API fork
        uses: actions/checkout@v4
        with:
          repository: audian-benp/CIPP-API
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync CIPP-API upstream
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          
          git remote add upstream https://github.com/KelvinTegelaar/CIPP-API.git || git remote set-url upstream https://github.com/KelvinTegelaar/CIPP-API.git
          git fetch upstream master
          git merge upstream/master --no-edit
          git push origin master
